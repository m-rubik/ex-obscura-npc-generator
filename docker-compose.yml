services:
  npc-generator:
    build:
      context: .
      dockerfile: Dockerfile
    image: ex-obscura-npc:latest
    working_dir: /work
    ports:
      - "8080:8080"
    volumes:
      - .:/work:cached
    command: ["sleep", "infinity"]

  frontend:
    image: node:20
    working_dir: /work/frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/work:cached
    command: sh -c "cd /work/frontend && npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - npc-generator
